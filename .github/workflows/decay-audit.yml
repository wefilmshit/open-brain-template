name: Decay Audit

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run decay audit
        env:
          MEMORY_MCP_URL: ${{ secrets.MEMORY_MCP_URL }}
          MEMORY_MCP_TOKEN: ${{ secrets.MEMORY_MCP_TOKEN }}
        run: node audit/decay-audit.js

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/results/
          if git diff --cached --quiet; then
            echo "No new snapshot to commit."
          else
            git commit -m "audit: weekly decay snapshot"
            git push
          fi
